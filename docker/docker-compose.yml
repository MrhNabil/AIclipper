version: '3.8'

services:
  # ── AIClipper Web Application ──
  aiclipper-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: aiclipper-app
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
      - subtitles:/app/subtitles
      - thumbnails:/app/thumbnails
      - data:/app/data
      - logs:/app/logs
      - models:/app/models
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

  # ── AIClipper Task Queue Worker ──
  aiclipper-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: aiclipper-worker
    command: python -m backend.workers.consumer
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
      - subtitles:/app/subtitles
      - thumbnails:/app/thumbnails
      - data:/app/data
      - logs:/app/logs
      - models:/app/models
    environment:
      - APP_ENV=production
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

  # ── Ollama (Local LLM) ──
  ollama:
    image: ollama/ollama:latest
    container_name: aiclipper-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # To pull a model after startup:
    # docker exec aiclipper-ollama ollama pull qwen2

volumes:
  uploads:
  outputs:
  subtitles:
  thumbnails:
  data:
  logs:
  models:
  ollama_data:
